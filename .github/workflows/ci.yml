# ConsistencyForge CI Pipeline
# Runs on every push and pull request to master/main

name: CI

"on":
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Python Linting ───────────────────────────────────────────────
  lint-python:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 app/ --count --max-complexity=15 --max-line-length=120 \
            --statistics --show-source --exit-zero

  # ── Backend Tests ─────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: consistencyforge
          POSTGRES_PASSWORD: consistencyforge
          POSTGRES_DB: consistencyforge
        options: >-
          --health-cmd pg_isready -U consistencyforge
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Check for test files
        id: check-tests
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify application imports
        run: |
          python -c "from app.main import app; print(f'FastAPI app loaded: {app.title} v{app.version}')"

      - name: Run tests (if any exist)
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          pytest -v --asyncio-mode=auto
        env:
          DATABASE_URL: postgresql+asyncpg://consistencyforge:consistencyforge@localhost:5432/consistencyforge
          JWT_SECRET: ci-test-secret-key
          REDIS_URL: redis://localhost:6379/0

  # ── Frontend Build Check ─────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build